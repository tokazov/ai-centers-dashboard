# Fly.io configuration for AI Centers Dashboard

app = "ai-centers-dashboard"
primary_region = "ams"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[env]
  PORT = "8000"
  DATABASE_PATH = "/data/ai_centers.db"

[mounts]
  source = "data"
  destination = "/data"
